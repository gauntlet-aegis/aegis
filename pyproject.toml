[project]
name = "sentinel-aegis"
version = "0.1.0"
description = "Sentinel: a credential-exfiltration defense proxy (CIFT + DP-HONEY + NIMBUS)"
requires-python = ">=3.12,<3.13"
dependencies = [
    "torch>=2.4,<2.6",
    "transformers>=4.44,<4.48",
    "accelerate",
    "numpy>=1.26,<2.1",
    "scikit-learn>=1.5",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "httpx>=0.27",
    "pydantic>=2.8",
    "sse-starlette>=2.1",
    "sentence-transformers",
    "pyyaml",
    "rich",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["sentinel*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[tool.ruff]
line-length = 100
target-version = "py312"
