<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sentinel — live</title>
<style>
  :root {
    --bg: #0b0e14; --panel: #131822; --panel2: #1a212e; --ink: #e6edf3; --muted: #8b97a7;
    --line: #232c3b;
    --pass: #2ea043; --warn: #d4a017; --sanitize: #e08c2f; --block: #e5484d;
    --skip: #3a4452; --accent: #4493f8;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font: 14px/1.5 ui-sans-serif, -apple-system, "Segoe UI", system-ui, sans-serif; }
  header { display: flex; align-items: center; gap: 16px; padding: 14px 20px;
    border-bottom: 1px solid var(--line); background: var(--panel); position: sticky; top: 0; z-index: 5; }
  header h1 { font-size: 16px; margin: 0; letter-spacing: .04em; }
  header h1 b { color: var(--accent); }
  .badge { font-size: 11px; padding: 3px 9px; border-radius: 999px; border: 1px solid var(--line);
    color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--block); display: inline-block; }
  .dot.on { background: var(--pass); }
  .meter-wrap { margin-left: auto; width: 320px; }
  .meter-label { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); }
  .meter { position: relative; height: 12px; background: var(--panel2); border: 1px solid var(--line);
    border-radius: 6px; overflow: hidden; margin-top: 4px; }
  .meter .fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--pass), var(--warn), var(--block));
    transition: width .4s ease; }
  .meter .mark { position: absolute; top: -2px; bottom: -2px; width: 2px; background: var(--ink); opacity: .5; }
  main { display: grid; grid-template-columns: 1fr 1fr; gap: 0; height: calc(100vh - 57px); }
  .col { overflow-y: auto; padding: 16px; }
  .col:first-child { border-right: 1px solid var(--line); }
  .col h2 { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted);
    margin: 0 0 12px; display: flex; align-items: center; gap: 8px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-left-width: 4px;
    border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; animation: in .25s ease; }
  @keyframes in { from { opacity: 0; transform: translateY(6px);} to {opacity:1; transform:none;} }
  .card.pass { border-left-color: var(--pass); }
  .card.warn { border-left-color: var(--warn); }
  .card.sanitize { border-left-color: var(--sanitize); }
  .card.block { border-left-color: var(--block); }
  .row { display: flex; align-items: center; gap: 10px; }
  .turn { font-weight: 700; }
  .attack { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; }
  .verdict { margin-left: auto; font-size: 11px; text-transform: uppercase; letter-spacing: .06em;
    padding: 2px 8px; border-radius: 4px; }
  .verdict.pass { background: rgba(46,160,67,.15); color: var(--pass); }
  .verdict.warn { background: rgba(212,160,23,.15); color: var(--warn); }
  .verdict.sanitize { background: rgba(224,140,47,.15); color: var(--sanitize); }
  .verdict.block { background: rgba(229,72,77,.15); color: var(--block); }
  .chips { display: flex; gap: 6px; margin: 10px 0 8px; flex-wrap: wrap; }
  .chip { font-size: 10px; font-family: ui-monospace, monospace; padding: 3px 8px; border-radius: 4px;
    border: 1px solid var(--line); color: var(--muted); }
  .chip.benign { color: var(--pass); border-color: rgba(46,160,67,.4); }
  .chip.suspicious { color: var(--warn); border-color: rgba(212,160,23,.4); }
  .chip.malicious { color: var(--block); border-color: rgba(229,72,77,.5); background: rgba(229,72,77,.08); }
  .chip.skipped { color: var(--skip); }
  .out { font-family: ui-monospace, monospace; font-size: 12px; color: var(--muted);
    background: var(--panel2); border-radius: 6px; padding: 8px 10px; white-space: pre-wrap;
    word-break: break-word; max-height: 90px; overflow: hidden; }
  .caught { font-size: 11px; color: var(--muted); margin-top: 6px; }
  .caught b { color: var(--ink); }
  .landed { color: var(--block); font-weight: 700; }
  .empty { color: var(--skip); font-size: 12px; padding: 20px 0; text-align: center; }
  .card { cursor: pointer; }
  .timing { margin-left: auto; font-size: 10px; color: var(--skip); font-family: ui-monospace, monospace; }
  .preout { color: var(--accent); }
  .io { display: grid; gap: 6px; margin: 8px 0; }
  .io .lbl { font-size: 9px; text-transform: uppercase; letter-spacing: .08em; color: var(--skip); }
  .in { font-size: 12px; color: var(--ink); background: var(--panel2); border-radius: 6px;
    padding: 7px 10px; white-space: pre-wrap; word-break: break-word; max-height: 76px; overflow: hidden;
    border-left: 2px solid var(--line); }
  .details { display: none; margin-top: 8px; border-top: 1px dashed var(--line); padding-top: 8px; }
  .card.open .details { display: block; }
  .det { font-family: ui-monospace, monospace; font-size: 11px; display: grid;
    grid-template-columns: 64px 1fr; gap: 4px 10px; padding: 3px 0; }
  .det .name { color: var(--muted); }
  .det .name.benign { color: var(--pass); } .det .name.suspicious { color: var(--warn); }
  .det .name.malicious { color: var(--block); } .det .name.skipped { color: var(--skip); }
  .det .body { color: var(--ink); word-break: break-word; }
  .sparks { display: inline-flex; gap: 2px; align-items: flex-end; height: 14px; vertical-align: bottom; }
  .sparks i { width: 5px; background: var(--accent); border-radius: 1px; display: inline-block; }
  .hint { font-size: 9px; color: var(--skip); margin-top: 4px; }
</style>
</head>
<body>
<header>
  <h1>SENTINEL<b>·</b>live</h1>
  <span class="badge"><span id="conn" class="dot"></span> <span id="connlabel">connecting</span></span>
  <div class="meter-wrap">
    <div class="meter-label"><span>NIMBUS budget</span><span id="meterval">0.0 / 0 bits</span></div>
    <div class="meter">
      <div id="fill" class="fill"></div>
      <div class="mark" style="left:60%"></div>
      <div class="mark" style="left:90%"></div>
    </div>
  </div>
</header>
<main>
  <section class="col" id="col-whitebox"><h2>White-box (CIFT + DP-HONEY + NIMBUS)</h2><div id="feed-whitebox"><div class="empty">waiting for traffic…</div></div></section>
  <section class="col" id="col-blackbox"><h2>Black-box (API-only — no CIFT)</h2><div id="feed-blackbox"><div class="empty">waiting for traffic…</div></div></section>
</main>
<script>
const LAYERS = ["text", "cift", "dp_honey", "nimbus"];
const feeds = { whitebox: document.getElementById("feed-whitebox"),
                blackbox: document.getElementById("feed-blackbox") };
const seeded = { whitebox: false, blackbox: false };

function chip(layer, lr) {
  const v = lr ? lr.verdict : "skipped";
  return `<span class="chip ${v}">${layer}${lr && lr.score!=null ? ":"+(+lr.score).toFixed(2) : ""}</span>`;
}

function esc(s) { return (s||"").replace(/[&<>]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function fmt(x, d=2) { return (x==null) ? "—" : (+x).toFixed(d); }

function sparks(arr) {
  if (!arr || !arr.length) return "";
  const m = Math.max(1e-6, ...arr.map(Math.abs));
  return `<span class="sparks" title="per-layer CFS">` +
    arr.map(v => `<i style="height:${Math.max(2, Math.abs(v)/m*14).toFixed(1)}px"></i>`).join("") + `</span>`;
}

function layerDetail(name, lr) {
  if (!lr) return `<div class="det"><span class="name skipped">${name}</span><span class="body">—</span></div>`;
  const d = lr.detail || {};
  let body;
  if (name === "cift") {
    body = d.reason ? d.reason
      : `score ${fmt(lr.score,3)} / thr ${fmt(lr.threshold,3)} ${sparks(d.per_layer_cfs)}`;
  } else if (name === "text") {
    body = d.matched_verbatim ? "verbatim secret in output" : "no verbatim match";
  } else if (name === "dp_honey") {
    const hits = d.hits || [];
    body = hits.length
      ? hits.map(h => `${h.encoding} frag ${fmt(h.fragment_ratio,2)}${h.exact ? " (exact)" : ""} …${esc(h.token_tail||"")}`).join(", ")
      : (d.reason || "no leak");
  } else if (name === "nimbus") {
    body = `+${fmt(d.i_turn_bits,2)} bits · cum ${fmt(d.i_cum_bits,2)} · ratio ${fmt(d.ratio,2)}`;
  } else {
    body = esc(JSON.stringify(d));
  }
  const lat = lr.latency_ms != null ? ` · ${(+lr.latency_ms).toFixed(1)}ms` : "";
  return `<div class="det"><span class="name ${lr.verdict}">${name}</span><span class="body">${body}${lat}</span></div>`;
}

function render(ev) {
  const mode = ev.mode || "whitebox";
  const feed = feeds[mode] || feeds.whitebox;
  if (!seeded[mode]) { feed.innerHTML = ""; seeded[mode] = true; }

  const byLayer = {}; (ev.layers||[]).forEach(l => byLayer[l.layer] = l);
  const t = ev.timing_ms || {};
  const preOut = ev.caught_by === "cift";
  const timing = `${t.total ? Math.round(t.total) : "?"}ms`
    + (t.forward ? ` · fwd ${Math.round(t.forward)}ms` : "")
    + (preOut ? ` · <span class="preout">blocked pre-output</span>` : "");
  const input = ev.untrusted_content_preview || ev.user_query || "";
  const card = document.createElement("div");
  card.className = "card " + ev.action;
  card.innerHTML = `
    <div class="row">
      <span class="turn">#${ev.turn_index}</span>
      <span class="attack">${ev.attack_label ? "attack:"+ev.attack_label : "benign"}</span>
      <span class="verdict ${ev.action}">${ev.action}</span>
      <span class="timing">${timing}</span>
    </div>
    <div class="chips">${LAYERS.map(l => chip(l, byLayer[l])).join("")}</div>
    <div class="io">
      <div><div class="lbl">attacker input</div><div class="in">${esc(input)}</div></div>
      <div><div class="lbl">model output (post-policy)</div><div class="out">${esc(ev.output_preview)}</div></div>
    </div>
    <div class="caught">
      ${ev.caught_by ? `caught by <b>${ev.caught_by}</b>` : "no layer fired"}
      ${ev.landed ? ` · <span class="landed">⚠ ATTACK LANDED</span>` : ""}
    </div>
    <div class="hint">▸ click for per-layer detail</div>
    <div class="details">${LAYERS.map(l => layerDetail(l, byLayer[l])).join("")}</div>`;
  card.addEventListener("click", () => card.classList.toggle("open"));
  feed.prepend(card);

  if (ev.nimbus) {
    const n = ev.nimbus;
    document.getElementById("fill").style.width = Math.min(100, n.ratio*100) + "%";
    document.getElementById("meterval").textContent =
      `${n.cumulative_bits.toFixed(1)} / ${n.budget_bits} bits`;
  }
}

function connect() {
  const es = new EventSource("/events");
  const dot = document.getElementById("conn"), label = document.getElementById("connlabel");
  es.addEventListener("open", () => { dot.classList.add("on"); label.textContent = "live"; });
  es.addEventListener("turn", e => render(JSON.parse(e.data)));
  es.addEventListener("error", () => { dot.classList.remove("on"); label.textContent = "reconnecting"; });
}
connect();
</script>
</body>
</html>
